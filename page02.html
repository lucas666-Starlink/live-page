<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>奥萨苏纳VS皇家贝蒂斯</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .sub {
      color: #bbb;
      margin-bottom: 18px;
      font-size: 15px;
    }
    video {
      width: 100%;
      max-width: 960px;
      background: #000;
      border-radius: 10px;
    }
     </style>
</head>
<body>
  <div class="wrap">
    <h1>西甲 奥萨苏纳VS皇家贝蒂斯</h1>
    <div class="sub">2026/04/12 20:00</div>
    <video id="video" controls autoplay playsinline webkit-playsinline></video>

  </div>

  <script>
    const video = document.getElementById('video');
    const videoSrc = 'http://feijing-xzbforanchor.52kq.top/live/202_4822663_2.m3u8;

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoSrc;
    } else if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(videoSrc);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(() => {});
      });
    } else {
      alert('当前设备不支持播放该直播流');
    }
  </script>
</body>
</html>
